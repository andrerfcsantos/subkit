version: 2

project_name: subkit

builds:
  - id: subkit
    main: ./cmd/subkit
    binary: subkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/andrerfcsantos/subkit-codex/internal/app.version={{.Version}}
        -X github.com/andrerfcsantos/subkit-codex/internal/app.commit={{.FullCommit}}
        -X github.com/andrerfcsantos/subkit-codex/internal/app.date={{.Date}}

archives:
  - id: subkit
    ids:
      - subkit
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}
    wrap_in_directory: true
    files:
      - README.md

msi:
  - id: subkit
    ids:
      - subkit
    name: "{{ .ProjectName }}_{{ .Version }}_windows_{{ .MsiArch }}"
    wxs: ./build/windows/subkit.wxs
    replace: false
    mod_timestamp: "{{ .CommitTimestamp }}"
    version: v3

dmg:
  - id: subkit
    ids:
      - subkit
    name: "{{ .ProjectName }}_{{ .Version }}_darwin_{{ .Arch }}"
    use: binary
    if: '{{ eq .Os "darwin" }}'
    extra_files:
      - README.md
    replace: false
    mod_timestamp: "{{ .CommitTimestamp }}"

release:
  github:
    owner: andrerfcsantos
    name: subkit

winget:
  - name: subkit
    package_identifier: AndreSantos.Subkit
    package_name: subkit
    publisher: Andre Santos
    publisher_url: https://github.com/andrerfcsantos
    publisher_support_url: https://github.com/andrerfcsantos/subkit/issues
    homepage: https://github.com/andrerfcsantos/subkit
    license: MIT
    license_url: https://github.com/andrerfcsantos/subkit/blob/main/LICENSE
    copyright: Copyright (c) 2026 Andre Santos
    short_description: CLI for generating subtitle and transcript artifacts from media files.
    description: subkit is a Go CLI for generating subtitle and transcript artifacts from media files.
    release_notes_url: https://github.com/andrerfcsantos/subkit/releases/tag/{{ .Tag }}
    tags:
      - subtitles
      - transcript
      - transcription
      - cli
      - media
    use: archive
    ids:
      - subkit
    repository:
      owner: andrerfcsantos
      name: winget-pkgs
      branch: subkit-{{ .Version }}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      token_type: github
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
        check_boxes: true
