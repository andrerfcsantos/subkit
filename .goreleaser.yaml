version: 2

project_name: subkit

builds:
  - id: subkit
    main: ./cmd/subkit
    binary: subkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/andrerfcsantos/subkit-codex/internal/app.version={{.Version}}
        -X github.com/andrerfcsantos/subkit-codex/internal/app.commit={{.FullCommit}}
        -X github.com/andrerfcsantos/subkit-codex/internal/app.date={{.Date}}

archives:
  - id: subkit
    ids:
      - subkit
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}
    wrap_in_directory: true
    files:
      - README.md

release:
  github:
    owner: andrerfcsantos
    name: subkit
